<nav class="top-nav">
    <div style="display: flex; align-items: center; gap: var(--spacing-md);">
        <button class="menu-toggle" type="button" aria-label="Open navigation">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <line x1="3" y1="12" x2="21" y2="12"/>
                <line x1="3" y1="6" x2="21" y2="6"/>
                <line x1="3" y1="18" x2="21" y2="18"/>
            </svg>
        </button>
        <h1 class="page-title">{% block page_title %}AuthFlow{% endblock %}</h1>
    </div>
    <div class="user-menu">
        <a href="{{ url_for('main.support') }}" class="btn btn-sm" style="background: linear-gradient(135deg, rgba(239, 68, 68, 0.2), rgba(239, 68, 68, 0.1)); color: #ef4444; border: 1px solid rgba(239, 68, 68, 0.3);" title="Support us">
            ❤️ Support
        </a>
        {% if current_user.is_authenticated %}
        <a href="{{ url_for('blog.create_blog') }}" class="btn btn-primary btn-sm">Write</a>
        <a href="{{ url_for('main.public_profile', username=current_user.username) }}" class="user-avatar" style="text-decoration: none;">
            {{ current_user.username[0] | upper }}
        </a>
        {% else %}
        <a href="{{ url_for('auth.login') }}" class="btn btn-primary btn-sm">Sign In</a>
        {% endif %}
    </div>
</nav>
