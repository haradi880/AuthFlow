<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="csrf-token" content="{{ csrf_token() }}">
    <title>{% block title %}AuthFlow{% endblock %}</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Poppins:wght@500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Stylesheets -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/animations.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/components.css') }}">
    {% block extra_css %}{% endblock %}
</head>
<body>
    <!-- Animated Background -->
    <div class="bg-animation">
        <div class="bg-blob bg-blob-1"></div>
        <div class="bg-blob bg-blob-2"></div>
        <div class="bg-blob bg-blob-3"></div>
        <div class="bg-grid"></div>
    </div>

    <!-- Toast Container -->
    <div class="toast-container" id="toastContainer"></div>
    <div class="cookie-banner" id="cookieBanner" hidden>
        <div>
            <strong>Cookie preferences</strong>
            <p>Essential cookies keep login, CSRF, and remember-me working. Optional analytics cookies stay off unless you accept them.</p>
        </div>
        <div class="cookie-actions">
            <button class="btn btn-secondary btn-sm" type="button" id="rejectOptionalCookies">Essential only</button>
            <button class="btn btn-primary btn-sm" type="button" id="acceptOptionalCookies">Accept optional</button>
        </div>
    </div>

    {% block content %}{% endblock %}

    <!-- Scripts -->
    <!-- Notification Sound -->
    <audio id="notificationSound" preload="auto">
        <source src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3" type="audio/mpeg">
    </audio>

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
    <script>
        function playNotificationSound() {
            const sound = document.getElementById('notificationSound');
            if (sound) {
                sound.currentTime = 0;
                sound.play().catch(e => console.log("Sound play blocked by browser. User must interact first."));
            }
        }
        
        // Global activity polling for notifications and messages.
        let currentNotifCount = {{ unread_counts.notifications }};
        let currentMessageCount = {{ unread_counts.messages }};
        function updateBadge(selector, count) {
            document.querySelectorAll(selector).forEach((badge) => {
                badge.textContent = count;
                badge.style.display = count > 0 ? 'inline-block' : 'none';
            });
        }
        async function checkGlobalActivity() {
            try {
                const response = await fetch('/api/pulse', {
                    headers: { 'X-Requested-With': 'XMLHttpRequest' }
                });
                if (response.ok) {
                    const data = await response.json();
                    if (data.notifications > currentNotifCount || data.messages > currentMessageCount) {
                        playNotificationSound();
                    }
                    currentNotifCount = data.notifications;
                    currentMessageCount = data.messages;
                    updateBadge('.js-notification-badge', currentNotifCount);
                    updateBadge('.js-message-badge', currentMessageCount);
                }
            } catch (e) {}
        }
        {% if current_user.is_authenticated %}
        setInterval(checkGlobalActivity, 8000);
        {% endif %}
    </script>
    <script>
        window.AuthFlow = window.AuthFlow || {};
        window.AuthFlow.csrfToken = "{{ csrf_token() }}";
        document.addEventListener('submit', function (event) {
            const form = event.target;
            if (!form || form.method.toLowerCase() !== 'post' || form.querySelector('input[name="_csrf_token"]')) return;
            const input = document.createElement('input');
            input.type = 'hidden';
            input.name = '_csrf_token';
            input.value = window.AuthFlow.csrfToken;
            form.appendChild(input);
        }, true);
        const originalFetch = window.fetch;
        window.fetch = function (resource, options) {
            options = options || {};
            const method = (options.method || 'GET').toUpperCase();
            if (!['GET', 'HEAD', 'OPTIONS', 'TRACE'].includes(method)) {
                options.headers = Object.assign({'X-CSRFToken': window.AuthFlow.csrfToken}, options.headers || {});
            }
            return originalFetch(resource, options);
        };
        document.addEventListener('DOMContentLoaded', function () {
            const flashedMessages = {{ get_flashed_messages(with_categories=true) | tojson }};
            if (window.toast && flashedMessages.length) {
                flashedMessages.forEach(function (item) {
                    const category = item[0] === 'message' ? 'info' : item[0];
                    toast.show(item[1], category);
                });
            }
            const cookieBanner = document.getElementById('cookieBanner');
            const consent = localStorage.getItem('authflow_cookie_consent');
            if (cookieBanner && !consent) cookieBanner.hidden = false;
            document.getElementById('acceptOptionalCookies')?.addEventListener('click', function () {
                localStorage.setItem('authflow_cookie_consent', 'optional');
                cookieBanner.hidden = true;
            });
            document.getElementById('rejectOptionalCookies')?.addEventListener('click', function () {
                localStorage.setItem('authflow_cookie_consent', 'essential');
                cookieBanner.hidden = true;
            });
        });
    </script>
    {% block extra_js %}{% endblock %}
</body>
</html>
