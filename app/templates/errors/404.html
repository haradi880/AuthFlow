{% extends "base.html" %}
{% block title %}Page Not Found - AuthFlow{% endblock %}
{% block extra_css %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/dashboard.css') }}">
{% endblock %}
{% block content %}
<main class="main-content" style="margin-left: 0; min-height: 100vh; display: grid; place-items: center;">
    <section class="content-card" style="max-width: 640px; text-align: center;">
        <div class="stat-value">404</div>
        <h1 class="page-title" style="margin-bottom: var(--spacing-md);">Page not found</h1>
        <p style="color: var(--text-muted); margin-bottom: var(--spacing-xl);">The page may have moved, been deleted, or the link may be incorrect.</p>
        <div class="inline-actions" style="justify-content: center;">
            <a href="{{ url_for('main.home') }}" class="btn btn-primary">Go Home</a>
            <a href="{{ url_for('blog.blogs_feed') }}" class="btn" style="background: var(--bg-tertiary); color: var(--text-secondary);">Browse Blogs</a>
        </div>
    </section>
</main>
{% endblock %}
