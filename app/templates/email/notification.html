<!DOCTYPE html>
<html>
<head>
    <style>
        .container { font-family: sans-serif; padding: 20px; color: #333; }
        .header { font-size: 24px; font-weight: bold; color: #6366f1; margin-bottom: 20px; }
        .message { font-size: 16px; line-height: 1.5; margin-bottom: 20px; }
        .btn { display: inline-block; padding: 10px 20px; background-color: #6366f1; color: white; text-decoration: none; border-radius: 5px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">AuthFlow Notification</div>
        <div class="message">{{ message }}</div>
        {% if link %}
        <a href="{{ link }}" class="btn">View on AuthFlow</a>
        {% endif %}
        <div style="margin-top: 30px; font-size: 12px; color: #666;">
            You're receiving this because you have email notifications enabled.
            <br>
            <a href="/settings">Manage email preferences</a>.
        </div>
    </div>
</body>
</html>
