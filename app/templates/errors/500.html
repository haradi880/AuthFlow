{% extends "base.html" %}
{% block title %}Server Error - AuthFlow{% endblock %}
{% block extra_css %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/dashboard.css') }}">
{% endblock %}
{% block content %}
<main class="main-content" style="margin-left: 0; min-height: 100vh; display: grid; place-items: center;">
    <section class="content-card" style="max-width: 640px; text-align: center;">
        <div class="stat-value">500</div>
        <h1 class="page-title" style="margin-bottom: var(--spacing-md);">Something broke</h1>
        <p style="color: var(--text-muted); margin-bottom: var(--spacing-xl);">The error has been logged. Try refreshing or return home.</p>
        <a href="{{ url_for('main.home') }}" class="btn btn-primary">Go Home</a>
    </section>
</main>
{% endblock %}
